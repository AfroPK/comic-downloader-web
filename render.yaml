services:
  - type: web
    name: comic-downloader-backend
    runtime: node
    build:
      buildCommand: |
        apt-get update && apt-get install -y chromium-browser
        npm install
      publishDir: .
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CHROME_PATH
        value: /usr/bin/chromium-browser
    healthCheck:
      path: /api/health
