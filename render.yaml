services:
  - type: web
    name: comic-downloader-backend
    runtime: node
    build:
      buildCommand: |
        npm install
        npx puppeteer browsers install chrome
      publishDir: .
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CHROME_PATH
        value: /opt/render/.cache/puppeteer/chrome/linux-121.0.6167.85/chrome-linux/chrome
    healthCheck:
      path: /api/health
