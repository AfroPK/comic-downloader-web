services:
  - type: web
    name: comic-downloader-backend
    runtime: node
    build:
      buildCommand: |
        npm install
        npx puppeteer browsers install chrome
      publishDir: .
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/.cache/puppeteer
    healthCheck:
      path: /api/health
